<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Market Trends + ATR(14)*2 / *5 + RSI</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; padding: 20px; background: #f7f7f8; color: #111; }
    .center { text-align: center; }
    .card { background: white; padding: 18px; border-radius: 8px; box-shadow: 0 6px 18px rgba(16,24,40,0.06); max-width: 1200px; margin: 20px auto; }
    input[type="password"] { padding: 8px 10px; font-size: 16px; border-radius: 6px; border: 1px solid #d0d7de; }
    button { padding: 8px 12px; font-size: 16px; border-radius: 6px; border: none; cursor: pointer; background:#2563eb; color:white; }
    button:disabled { opacity: 0.6; cursor: default; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.9rem; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #e6e6e9; font-family: monospace; }
    th { background: #fafafa; font-weight: 600; }
    .muted { color: #666; font-size: 14px; }
    .loading { display:inline-block; margin-left:8px; }
    .trend-indicator { font-size: 0.95rem; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
</head>
<body>
<div id="app" class="card">
  <div id="loginView" class="center">
    <h2>🔒 Enter Password</h2>
    <div>
      <input id="passwordInput" type="password" placeholder="Password" />
      <button id="unlockBtn">Unlock</button>
    </div>
    <p id="loginMsg" class="muted">ATR(14) ×2 / ×5 + RSI(14) + SMAs</p>
  </div>

  <div id="mainView" style="display:none;">
    <h2>📊 Market Data (ATR14 *2 & *5, RSI14)</h2>
    <div id="controls" class="muted">
      <span id="statusText">Idle</span>
      <button id="refreshBtn" style="margin-left:12px;">Refresh</button>
    </div>

    <div id="tableContainer" style="margin-top:12px; overflow-x: auto;">
      <div id="loadingBlock" style="display:none;" class="muted">Loading data<span class="loading">⏳</span></div>
      <table id="resultsTable" style="display:none;">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Trend (Close)</th>
            <th>SMA50</th>
            <th>SMA100</th>
            <th>SMA200</th>
            <th>ATR(14)×2</th>
            <th>ATR(14)×5</th>
            <th>RSI(14)</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>
</div>
        
<script>
(() => {
  const API_KEY = "b03b52a7e2e348b994a45de0b3f6ae09";
  const encryptionKey = "secretKey";
  const encryptedPassword = CryptoJS.AES.encrypt("9617", encryptionKey).toString();

  const loginView = document.getElementById('loginView');
  const mainView = document.getElementById('mainView');
  const passwordInput = document.getElementById('passwordInput');
  const unlockBtn = document.getElementById('unlockBtn');

  const statusText = document.getElementById('statusText');
  const refreshBtn = document.getElementById('refreshBtn');
  const loadingBlock = document.getElementById('loadingBlock');
  const resultsTable = document.getElementById('resultsTable');
  const resultsBody = document.getElementById('resultsBody');

  let authorized = false;

  // Symbol lists
  const yahooSymbols = ["^DJI", "^NDX"]; // US30 and US100
  const twelveSymbols = ["XAU/USD", "EUR/USD", "GBP/USD", "USD/JPY", "USD/CAD", "GBP/JPY","AUD/USD", "NZD/USD"];

  // ----- SMA (simple moving average) -----
  function calculateSMA(values, period) {
    const res = new Array(values.length).fill(null);
    for (let i = 0; i < values.length; i++) {
      if (i < period - 1) continue;
      let sum = 0;
      for (let j = i - period + 1; j <= i; j++) sum += values[j];
      res[i] = sum / period;
    }
    return res;
  }

  // ----- ATR (Average True Range) for a given period -----
  function calculateATR(highs, lows, closes, period) {
    // True Range = max(high - low, abs(high - prevClose), abs(low - prevClose))
    const tr = new Array(highs.length).fill(null);
    for (let i = 0; i < highs.length; i++) {
      if (i === 0) {
        tr[i] = highs[i] - lows[i]; // first TR just high-low
      } else {
        const hl = highs[i] - lows[i];
        const hc = Math.abs(highs[i] - closes[i-1]);
        const lc = Math.abs(lows[i] - closes[i-1]);
        tr[i] = Math.max(hl, hc, lc);
      }
    }
    // ATR = SMA of TR over period
    return calculateSMA(tr, period);
  }

  // ----- RSI (Relative Strength Index, 14-period Wilder's smoothing) -----
  function calculateRSI(closes, period = 14) {
    const rsi = new Array(closes.length).fill(null);
    if (closes.length < period + 1) return rsi;

    // first average gain/loss over initial period
    let avgGain = 0, avgLoss = 0;
    for (let i = 1; i <= period; i++) {
      const change = closes[i] - closes[i-1];
      if (change > 0) { avgGain += change; }
      else { avgLoss -= change; } // loss as positive magnitude
    }
    avgGain /= period;
    avgLoss /= period;

    // first RSI value after initial period
    if (avgLoss === 0) {
      rsi[period] = 100;
    } else {
      const rs = avgGain / avgLoss;
      rsi[period] = 100 - (100 / (1 + rs));
    }

    // subsequent values using smoothing: avg = prevAvg*(period-1)/period + currentChange/period
    for (let i = period + 1; i < closes.length; i++) {
      const change = closes[i] - closes[i-1];
      let gain = 0, loss = 0;
      if (change > 0) gain = change;
      else loss = -change;

      avgGain = (avgGain * (period - 1) + gain) / period;
      avgLoss = (avgLoss * (period - 1) + loss) / period;

      if (avgLoss === 0) {
        rsi[i] = 100;
      } else {
        const rs = avgGain / avgLoss;
        rsi[i] = 100 - (100 / (1 + rs));
      }
    }
    return rsi;
  }

  // ----- Yahoo Finance (includes high/low) -----
  async function getYahooTrend(symbol) {
    try {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=5m&range=8d`;
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      const resp = await axios.get(proxyUrl);

      const data = resp.data.chart.result?.[0];
      if (!data) return { symbol, trend: "Error fetching data" };

      const quotes = data.indicators.quote[0];
      const closes = quotes.close;
      const highs = quotes.high;
      const lows = quotes.low;

      // Check if we have enough data (need at least 200 for SMA200, but we can still compute)
      if (!closes || closes.length < 50) return { symbol, trend: "Insufficient data" };

      // Calculate SMAs
      const SMA50 = calculateSMA(closes, 50);
      const SMA100 = calculateSMA(closes, 100);
      const SMA200 = calculateSMA(closes, 200);

      // Calculate ATR(14) – this is the base ATR
      const ATR14 = calculateATR(highs, lows, closes, 14);

      // Calculate RSI(14)
      const RSI14 = calculateRSI(closes, 14);

      const lastIdx = closes.length - 1;
      const lastClose = closes[lastIdx];
      const lastSMA50 = SMA50[lastIdx];
      const lastSMA100 = SMA100[lastIdx];
      const lastSMA200 = SMA200[lastIdx];
      const lastATR14 = ATR14[lastIdx];
      const lastRSI14 = RSI14[lastIdx];

      // Multiplied ATR values
      const atr2x = lastATR14 !== null ? lastATR14 * 2 : null;
      const atr5x = lastATR14 !== null ? lastATR14 * 5 : null;

      // Determine trend based on SMA alignment
      let trend;
      if (lastSMA50 && lastSMA100 && lastSMA200) {
        if (lastSMA50 > lastSMA100 && lastSMA100 > lastSMA200 && lastClose > lastSMA50)
          trend = `Uptrend 📈 (${lastClose.toFixed(6)})`;
        else if (lastSMA50 < lastSMA100 && lastSMA100 < lastSMA200 && lastClose < lastSMA50)
          trend = `Downtrend 📉 (${lastClose.toFixed(6)})`;
        else
          trend = `Sideways ➡️ (${lastClose.toFixed(6)})`;
      } else {
        trend = `Neutral (${lastClose ? lastClose.toFixed(2) : "-"})`;
      }

      return {
        symbol,
        trend,
        SMA50: lastSMA50,
        SMA100: lastSMA100,
        SMA200: lastSMA200,
        ATR2x: atr2x,
        ATR5x: atr5x,
        RSI14: lastRSI14
      };
    } catch (err) {
      console.error("Yahoo error", symbol, err);
      return { symbol, trend: "Error fetching data" };
    }
  }

  // ----- Twelve Data (includes high/low) -----
  async function getTwelveTrend(symbol) {
    try {
      const url = "https://api.twelvedata.com/time_series";
      const resp = await axios.get(url, {
        params: {
          symbol,
          interval: "5min",
          outputsize: 500,
          apikey: API_KEY,
        },
      });

      const data = resp.data;
      if (!data.values) return { symbol, trend: "Error fetching data" };

      // values array: each object has datetime, open, high, low, close, volume
      const values = data.values
        .map(v => ({
          datetime: new Date(v.datetime),
          close: parseFloat(v.close),
          high: parseFloat(v.high),
          low: parseFloat(v.low)
        }))
        .sort((a, b) => a.datetime - b.datetime);

      const closes = values.map(v => v.close);
      const highs = values.map(v => v.high);
      const lows = values.map(v => v.low);

      if (closes.length < 50) return { symbol, trend: "Insufficient data" };

      // SMAs
      const SMA50 = calculateSMA(closes, 50);
      const SMA100 = calculateSMA(closes, 100);
      const SMA200 = calculateSMA(closes, 200);

      // ATR(14)
      const ATR14 = calculateATR(highs, lows, closes, 14);

      // RSI(14)
      const RSI14 = calculateRSI(closes, 14);

      const lastIdx = closes.length - 1;
      const lastClose = closes[lastIdx];
      const lastSMA50 = SMA50[lastIdx];
      const lastSMA100 = SMA100[lastIdx];
      const lastSMA200 = SMA200[lastIdx];
      const lastATR14 = ATR14[lastIdx];
      const lastRSI14 = RSI14[lastIdx];

      const atr2x = lastATR14 !== null ? lastATR14 * 2 : null;
      const atr5x = lastATR14 !== null ? lastATR14 * 5 : null;

      let trend;
      if (lastSMA50 != null && lastSMA100 != null && lastSMA200 != null) {
        if (lastSMA50 > lastSMA100 && lastSMA100 > lastSMA200 && lastClose > lastSMA50)
          trend = `Uptrend 📈 (${lastClose.toFixed(6)})`;
        else if (lastSMA50 < lastSMA100 && lastSMA100 < lastSMA200 && lastClose < lastSMA50)
          trend = `Downtrend 📉 (${lastClose.toFixed(6)})`;
        else
          trend = `Sideways ➡️ (${lastClose.toFixed(6)})`;
      } else {
        trend = `Neutral (${lastClose ? lastClose.toFixed(2) : "-"})`;
      }

      return {
        symbol,
        trend,
        SMA50: lastSMA50,
        SMA100: lastSMA100,
        SMA200: lastSMA200,
        ATR2x: atr2x,
        ATR5x: atr5x,
        RSI14: lastRSI14
      };
    } catch (err) {
      console.error("Twelve Data error", symbol, err);
      return { symbol, trend: "Error fetching data" };
    }
  }

  // ----- Fetch all and render table -----
  async function fetchDataAndRender() {
    try {
      statusText.innerText = "Fetching...";
      loadingBlock.style.display = '';
      resultsTable.style.display = 'none';
      resultsBody.innerHTML = '';

      const yahooPromises = yahooSymbols.map(s => getYahooTrend(s));
      const twelvePromises = twelveSymbols.map(s => getTwelveTrend(s));

      const rows = await Promise.all([...yahooPromises, ...twelvePromises]);

      rows.forEach(r => {
        const tr = document.createElement('tr');
        // Format numbers
        tr.innerHTML = `
          <td>${r.symbol}</td>
          <td class="trend-indicator">${r.trend}</td>
          <td>${r.SMA50 ? r.SMA50.toFixed(6) : "-"}</td>
          <td>${r.SMA100 ? r.SMA100.toFixed(6) : "-"}</td>
          <td>${r.SMA200 ? r.SMA200.toFixed(6) : "-"}</td>
          <td>${r.ATR2x ? r.ATR2x.toFixed(6) : "-"}</td>
          <td>${r.ATR5x ? r.ATR5x.toFixed(6) : "-"}</td>
          <td>${r.RSI14 ? r.RSI14.toFixed(2) : "-"}</td>
        `;
        resultsBody.appendChild(tr);
      });

      resultsTable.style.display = '';
      statusText.innerText = "Updated: " + new Date().toLocaleString();
    } catch (err) {
      statusText.innerText = "Error";
      console.error(err);
      alert("Error fetching data. See console for details.");
    } finally {
      loadingBlock.style.display = 'none';
    }
  }

  // ----- Password protection -----
  unlockBtn.addEventListener('click', () => {
    try {
      const decrypted = CryptoJS.AES.decrypt(encryptedPassword, encryptionKey).toString(CryptoJS.enc.Utf8);
      if (passwordInput.value === decrypted) {
        authorized = true;
        loginView.style.display = 'none';
        mainView.style.display = '';
        fetchDataAndRender();
      } else alert("Wrong password!");
    } catch {
      alert("Decryption error");
    }
  });

  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlockBtn.click(); });
  refreshBtn.addEventListener('click', () => { if (authorized) fetchDataAndRender(); });
  passwordInput.focus();
})();
</script>
</body>
</html>
