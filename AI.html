<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Market Trends + AI Trading Signals (with SMAs)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; padding: 20px; background: #f7f7f8; color: #111; }
    .center { text-align: center; }
    .card { background: white; padding: 18px; border-radius: 8px; box-shadow: 0 6px 18px rgba(16,24,40,0.06); max-width: 1400px; margin: 20px auto; overflow-x: auto; }
    input[type="password"] { padding: 8px 10px; font-size: 16px; border-radius: 6px; border: 1px solid #d0d7de; }
    button { padding: 8px 12px; font-size: 16px; border-radius: 6px; border: none; cursor: pointer; background:#2563eb; color:white; }
    button:disabled { opacity: 0.6; cursor: default; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #e6e6e9; }
    th { background: #fafafa; font-weight: 600; position: sticky; top: 0; }
    .muted { color: #666; font-size: 14px; }
    .loading { display: inline-block; margin-left:8px; }
    .signal-long { color: #16a34a; font-weight: bold; }
    .signal-short { color: #dc2626; font-weight: bold; }
    .signal-neutral { color: #6b7280; }
    .sma-cell { font-family: monospace; font-size: 12px; }
    .status-bar { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .refresh-btn { background: #2563eb; }
    .refresh-btn:active { transform: scale(0.98); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
</head>
<body>
<div id="app" class="card">
  <div id="loginView" class="center">
    <h2>🔒 Enter Password</h2>
    <div>
      <input id="passwordInput" type="password" placeholder="Password" />
      <button id="unlockBtn">Unlock</button>
    </div>
    <p class="muted">Access market data + AI trading signals (Node.js backend with SMA support)</p>
  </div>

  <div id="mainView" style="display:none;">
    <h2>📊 Market Trends + AI Signals (with SMAs)</h2>
    <div class="status-bar">
      <span id="statusText" class="muted">Idle</span>
      <button id="refreshBtn" class="refresh-btn">⟳ Refresh All</button>
    </div>

    <div id="tableContainer">
      <div id="loadingBlock" style="display:none;" class="muted">Loading data<span class="loading">⏳</span></div>
      <table id="resultsTable" style="display:none;">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Price & Trend</th>
            <th>SMA50</th>
            <th>SMA100</th>
            <th>SMA200</th>
            <th>SMA500</th>
            <th>🤖 AI Signal (LONG/SHORT)</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
(() => {
  // ---------- CONFIGURATION ----------
  const API_KEY = "b03b52a7e2e348b994a45de0b3f6ae09";
  const encryptionKey = "secretKey";
  const encryptedPassword = CryptoJS.AES.encrypt("4444", encryptionKey).toString();
  const AI_SERVER_URL = "http://155.133.26.150:5000/predict";   // your Node.js backend

  // Symbol lists
  const yahooSymbols = ["^DJI", "^NDX"];
  const twelveSymbols = ["XAU/USD", "EUR/USD", "GBP/USD", "USD/JPY", "BTC/USD", "GBP/JPY","AUD/USD", "NZD/USD"];

  // DOM elements
  const loginView = document.getElementById('loginView');
  const mainView = document.getElementById('mainView');
  const passwordInput = document.getElementById('passwordInput');
  const unlockBtn = document.getElementById('unlockBtn');
  const statusText = document.getElementById('statusText');
  const refreshBtn = document.getElementById('refreshBtn');
  const loadingBlock = document.getElementById('loadingBlock');
  const resultsTable = document.getElementById('resultsTable');
  const resultsBody = document.getElementById('resultsBody');

  let authorized = false;

  // ---------- TECHNICAL INDICATORS ----------
  function calculateRSI(prices, period = 14) {
    if (prices.length < period + 1) return null;
    let gains = 0, losses = 0;
    for (let i = 1; i <= period; i++) {
      const diff = prices[i] - prices[i-1];
      if (diff >= 0) gains += diff;
      else losses -= diff;
    }
    let avgGain = gains / period;
    let avgLoss = losses / period;
    let rsi = 100 - (100 / (1 + avgGain / avgLoss));
    for (let i = period + 1; i < prices.length; i++) {
      const diff = prices[i] - prices[i-1];
      let gain = diff > 0 ? diff : 0;
      let loss = diff < 0 ? -diff : 0;
      avgGain = (avgGain * (period - 1) + gain) / period;
      avgLoss = (avgLoss * (period - 1) + loss) / period;
      if (avgLoss === 0) rsi = 100;
      else rsi = 100 - (100 / (1 + avgGain / avgLoss));
    }
    return rsi;
  }

  function calculateEMA(prices, period) {
    const k = 2 / (period + 1);
    const ema = [prices[0]];
    for (let i = 1; i < prices.length; i++) {
      ema.push(prices[i] * k + ema[i-1] * (1 - k));
    }
    return ema;
  }

  function calculateMACD(prices, fast=12, slow=26, signal=9) {
    if (prices.length < slow) return { macd: null, signalLine: null };
    const emaFast = calculateEMA(prices, fast);
    const emaSlow = calculateEMA(prices, slow);
    const macdLine = emaFast.map((v, i) => v - emaSlow[i]);
    const signalLine = calculateEMA(macdLine, signal);
    return {
      macd: macdLine[macdLine.length-1],
      signalLine: signalLine[signalLine.length-1]
    };
  }

  function calculateSMA(prices, period) {
    const res = new Array(prices.length).fill(null);
    for (let i = 0; i < prices.length; i++) {
      if (i < period - 1) continue;
      let sum = 0;
      for (let j = i - period + 1; j <= i; j++) sum += prices[j];
      res[i] = sum / period;
    }
    return res;
  }

  // ---------- FETCH FROM YAHOO (with all indicators) ----------
  async function getYahooData(symbol) {
    try {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=5m&range=8d`;
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      const resp = await axios.get(proxyUrl);
      const data = resp.data.chart.result?.[0];
      if (!data) return null;
      const closes = data.indicators.quote[0].close.filter(v => v !== null);
      const volumes = data.indicators.quote[0].volume.filter(v => v !== null);
      if (closes.length < 100) return null;
      const currentPrice = closes[closes.length-1];
      const rsi = calculateRSI(closes, 14);
      const { macd, signalLine } = calculateMACD(closes, 12, 26, 9);
      const volume = volumes[volumes.length-1] || 0;

      // SMAs
      const sma50arr = calculateSMA(closes, 50);
      const sma100arr = calculateSMA(closes, 100);
      const sma200arr = calculateSMA(closes, 200);
      const sma500arr = calculateSMA(closes, 500);
      const lastSMA50 = sma50arr[sma50arr.length-1];
      const lastSMA100 = sma100arr[sma100arr.length-1];
      const lastSMA200 = sma200arr[sma200arr.length-1];
      const lastSMA500 = sma500arr[sma500arr.length-1];

      // Simple trend text
      let trendText = `${currentPrice.toFixed(2)} `;
      if (lastSMA50 && lastSMA100 && lastSMA200 && lastSMA500) {
        if (lastSMA50 > lastSMA100 && lastSMA100 > lastSMA200 && lastSMA200 > lastSMA500 && currentPrice > lastSMA50)
          trendText += "📈 Uptrend";
        else if (lastSMA50 < lastSMA100 && lastSMA100 < lastSMA200 && lastSMA200 < lastSMA500 && currentPrice < lastSMA50)
          trendText += "📉 Downtrend";
        else trendText += "➡️ Sideways";
      } else trendText += "(insufficient data)";

      return {
        symbol,
        currentPrice,
        rsi,
        macd,
        signalLine,
        volume,
        sma50: lastSMA50,
        sma100: lastSMA100,
        sma200: lastSMA200,
        sma500: lastSMA500,
        trendText
      };
    } catch (err) {
      console.error("Yahoo error", symbol, err);
      return null;
    }
  }

  // ---------- FETCH FROM TWELVE DATA (with all indicators) ----------
  async function getTwelveData(symbol) {
    try {
      const url = "https://api.twelvedata.com/time_series";
      const resp = await axios.get(url, {
        params: {
          symbol,
          interval: "5min",
          outputsize: 500,
          apikey: API_KEY,
        },
      });
      const data = resp.data;
      if (!data.values) return null;
      const values = data.values
        .map(v => ({ datetime: new Date(v.datetime), close: parseFloat(v.close), volume: parseFloat(v.volume) || 0 }))
        .sort((a, b) => a.datetime - b.datetime);
      const closes = values.map(v => v.close);
      const volumes = values.map(v => v.volume);
      if (closes.length < 100) return null;
      const currentPrice = closes[closes.length-1];
      const rsi = calculateRSI(closes, 14);
      const { macd, signalLine } = calculateMACD(closes, 12, 26, 9);
      const volume = volumes[volumes.length-1] || 0;

      const sma50arr = calculateSMA(closes, 50);
      const sma100arr = calculateSMA(closes, 100);
      const sma200arr = calculateSMA(closes, 200);
      const sma500arr = calculateSMA(closes, 500);
      const lastSMA50 = sma50arr[sma50arr.length-1];
      const lastSMA100 = sma100arr[sma100arr.length-1];
      const lastSMA200 = sma200arr[sma200arr.length-1];
      const lastSMA500 = sma500arr[sma500arr.length-1];

      let trendText = `${currentPrice.toFixed(2)} `;
      if (lastSMA50 && lastSMA100 && lastSMA200 && lastSMA500) {
        if (lastSMA50 > lastSMA100 && lastSMA100 > lastSMA200 && lastSMA200 > lastSMA500 && currentPrice > lastSMA50)
          trendText += "📈 Uptrend";
        else if (lastSMA50 < lastSMA100 && lastSMA100 < lastSMA200 && lastSMA200 < lastSMA500 && currentPrice < lastSMA50)
          trendText += "📉 Downtrend";
        else trendText += "➡️ Sideways";
      } else trendText += "(insufficient data)";

      return {
        symbol,
        currentPrice,
        rsi,
        macd,
        signalLine,
        volume,
        sma50: lastSMA50,
        sma100: lastSMA100,
        sma200: lastSMA200,
        sma500: lastSMA500,
        trendText
      };
    } catch (err) {
      console.error("Twelve Data error", symbol, err);
      return null;
    }
  }

  // ---------- CALL NODE.JS BACKEND (with SMAs) ----------
  async function getAISignal(symbol, currentPrice, rsi, macd, signalLine, volume, sma50, sma100, sma200, sma500) {
    if (!rsi || !macd || !signalLine) return { direction: "N/A", sl: null, tp: null, error: "Missing indicators" };
    try {
      const payload = {
        symbol,
        current_price: currentPrice,
        rsi: parseFloat(rsi),
        macd: parseFloat(macd),
        signal_line: parseFloat(signalLine),
        volume: volume || 1000,
        sma50: sma50 || null,
        sma100: sma100 || null,
        sma200: sma200 || null,
        sma500: sma500 || null
      };
      const response = await axios.post(AI_SERVER_URL, payload, { timeout: 15000 });
      return {
        direction: response.data.direction,
        sl: response.data.stop_loss,
        tp: response.data.take_profit,
        raw: response.data.raw_llm_output
      };
    } catch (err) {
      console.error("AI server error", symbol, err.message);
      return { direction: "Error", sl: null, tp: null, error: err.message };
    }
  }

  // ---------- RENDER TABLE (fetch data + AI signals sequentially to show progress) ----------
  async function fetchDataAndRender() {
    try {
      statusText.innerText = "Fetching market data...";
      loadingBlock.style.display = '';
      resultsTable.style.display = 'none';
      resultsBody.innerHTML = '';

      // Get all symbols data
      const yahooPromises = yahooSymbols.map(s => getYahooData(s));
      const twelvePromises = twelveSymbols.map(s => getTwelveData(s));
      let allData = await Promise.all([...yahooPromises, ...twelvePromises]);
      allData = allData.filter(d => d !== null);

      statusText.innerText = "Getting AI signals (may take a while)...";
      // Process each symbol: call AI server and add row incrementally
      for (let i = 0; i < allData.length; i++) {
        const d = allData[i];
        const signal = await getAISignal(
          d.symbol, d.currentPrice, d.rsi, d.macd, d.signalLine, d.volume,
          d.sma50, d.sma100, d.sma200, d.sma500
        );
        d.aiSignal = signal;

        // Build row
        const tr = document.createElement('tr');
        let signalHtml = '';
        if (signal.direction === 'LONG') {
          signalHtml = `<span class="signal-long">🔵 LONG<br><span style="font-size:11px;">SL: ${signal.sl?.toFixed(2)}<br>TP: ${signal.tp?.toFixed(2)}</span></span>`;
        } else if (signal.direction === 'SHORT') {
          signalHtml = `<span class="signal-short">🔴 SHORT<br><span style="font-size:11px;">SL: ${signal.sl?.toFixed(2)}<br>TP: ${signal.tp?.toFixed(2)}</span></span>`;
        } else if (signal.direction === 'NEUTRAL') {
          signalHtml = `<span class="signal-neutral">⚪ NEUTRAL</span>`;
        } else {
          signalHtml = `<span class="muted">${signal.direction}</span>`;
        }

        tr.innerHTML = `
          <td><strong>${d.symbol}</strong></td>
          <td>${d.trendText}</td>
          <td class="sma-cell">${d.sma50 ? d.sma50.toFixed(4) : "-"}</td>
          <td class="sma-cell">${d.sma100 ? d.sma100.toFixed(4) : "-"}</td>
          <td class="sma-cell">${d.sma200 ? d.sma200.toFixed(4) : "-"}</td>
          <td class="sma-cell">${d.sma500 ? d.sma500.toFixed(4) : "-"}</td>
          <td>${signalHtml}</td>
        `;
        resultsBody.appendChild(tr);
        // Update status
        statusText.innerText = `AI signal for ${d.symbol} done (${i+1}/${allData.length})`;
      }

      resultsTable.style.display = '';
      statusText.innerText = "Updated: " + new Date().toLocaleString();
    } catch (err) {
      statusText.innerText = "Error";
      console.error(err);
      alert("Error fetching data. See console for details.");
    } finally {
      loadingBlock.style.display = 'none';
    }
  }

  // ---------- AUTHENTICATION ----------
  unlockBtn.addEventListener('click', () => {
    try {
      const decrypted = CryptoJS.AES.decrypt(encryptedPassword, encryptionKey).toString(CryptoJS.enc.Utf8);
      if (passwordInput.value === decrypted) {
        authorized = true;
        loginView.style.display = 'none';
        mainView.style.display = '';
        fetchDataAndRender();
      } else alert("Wrong password!");
    } catch {
      alert("Decryption error");
    }
  });

  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlockBtn.click(); });
  refreshBtn.addEventListener('click', () => { if (authorized) fetchDataAndRender(); });
  passwordInput.focus();
})();
</script>
</body>
</html>
